<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>나만의 예쁜 맛집 지도</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background-color: #f8f9fa; }
        #map { width: 100vw; height: 100vh; }
        
        /* 팝업창 디자인 꾸미기 */
        .custom-popup .leaflet-popup-content-wrapper {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 5px;
        }
        .custom-popup .popup-title {
            font-size: 16px; font-weight: bold; color: #2c3e50; margin-bottom: 8px; border-bottom: 2px solid #3498db; padding-bottom: 5px;
        }
        .custom-popup .popup-info {
            font-size: 13px; color: #555; margin: 4px 0;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 지도 시작 위치 맞추기 (서울 중심)
        var map = L.map('map').setView([37.5532, 126.9696], 13);

        // 2. 배경 지도 불러오기 (오픈스트리트맵)
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 3. ⭐️여기가 식당 데이터를 넣는 곳입니다! 엑셀 내용을 보며 계속 추가하세요⭐️
        var restaurants = [
            {
                name: "사유의서재 남산 와인다이닝",
                address: "중구 퇴계로 20길 13 3층",
                menu: "퓨전양식/와인",
                lat: 37.55968, // 위도 (숫자만)
                lng: 126.98588 // 경도 (숫자만)
            },
            {
                name: "테스트 식당 (서울역)",
                address: "서울특별시 용산구 청파로 378",
                menu: "한식",
                lat: 37.5532,
                lng: 126.9696
            }
        ];

        // 4. 지도에 핀 꽂고 팝업창 연결하기 (자동으로 됨)
        restaurants.forEach(function(place) {
            var popupContent = `
                <div class="popup-title">🍽️ ${place.name}</div>
                <p class="popup-info">📍 ${place.address}</p>
                <p class="popup-info">🍴 메뉴: ${place.menu}</p>
            `;
            L.marker([place.lat, place.lng])
                .bindPopup(popupContent, {className: 'custom-popup'})
                .addTo(map);
        });
    </script>
</body>
</html>
