<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>그랜드센트럴 주변 식당 지도</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background-color: #f8f9fa; }
        #map { width: 100vw; height: 100vh; }
        
        /* --- 프리미엄 팝업창 디자인 시작 --- */
        /* 기본 여백 없애기 및 둥근 모서리 설정 */
        .custom-popup .leaflet-popup-content-wrapper {
            padding: 0;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .custom-popup .leaflet-popup-content {
            margin: 0;
            width: 260px !important; 
        }
        /* 닫기(X) 버튼 하얀색으로 변경 */
        .custom-popup .leaflet-popup-close-button {
            color: #ffffff !important;
            padding: 8px 8px 0 0 !important;
        }

        /* 1. 상단 어두운 헤더 영역 */
        .popup-header {
            background-color: #242432; /* 어두운 네이비색 */
            color: white;
            padding: 16px;
        }
        .popup-title {
            font-size: 18px; 
            font-weight: bold; 
            margin-bottom: 10px;
        }
        .header-badges {
            display: flex; gap: 6px;
        }
        .badge-dark { background-color: #3b3b4d; padding: 4px 10px; border-radius: 12px; font-size: 12px; color: #ddd; }
        .badge-orange { background-color: #ff7f00; padding: 4px 10px; border-radius: 12px; font-size: 12px; font-weight: bold; }

        /* 2. 하단 하얀색 내용 영역 */
        .popup-body {
            background-color: white;
            padding: 16px;
        }
        .info-row {
            display: flex; align-items: flex-start; gap: 8px; margin-bottom: 10px; font-size: 13px; color: #444; line-height: 1.4;
        }

        /* 3. 특징 태그 (룸, 예약) */
        .feature-tags {
            display: flex; gap: 8px; margin: 15px 0;
        }
        .tag-green {
            background-color: #e6f8f0; color: #00a060; padding: 5px 10px; border-radius: 6px; font-size: 12px; font-weight: bold;
        }

        /* 4. 네이버 버튼 */
        .naver-btn {
            display: flex; align-items: center; justify-content: center; gap: 5px;
            background-color: #03c75a; color: white; text-decoration: none;
            padding: 10px; border-radius: 6px; font-weight: bold; font-size: 14px;
            margin-top: 10px; width: fit-content;
        }
        .naver-btn:hover { background-color: #02b350; color: white; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 구글 배경 지도
        var map = L.map('map').setView([37.556, 126.972], 15);
        L.tileLayer('https://mt1.google.com/vt/lyrs=m&hl=ko&x={x}&y={y}&z={z}', {
            attribution: '© Google Maps', maxZoom: 20
        }).addTo(map);

        // 2. 식당 데이터 (룸 여부, 예약 가능 여부 속성 추가)
        var restaurants = [
            {
                name: "모담 서울역점",
                address: "중구 세종대로 14 그랜드센트럴 지하 3층",
                menu: "한식",
                lat: 37.55820, lng: 126.97390,
                hasRoom: true, reservable: true
            },
            {
                name: "서령 본점",
                address: "중구 소월로 10 1층",
                menu: "한식",
                lat: 37.55640, lng: 126.97480,
                hasRoom: true, reservable: true
            },
            {
                name: "호우섬 서울역사점",
                address: "중구 한강대로 405 서울역사 3층",
                menu: "중식",
                lat: 37.55460, lng: 126.97060,
                hasRoom: true, reservable: true
            }
        ];

        // 3. 아이콘 디자인
        var koreanIcon = L.divIcon({ className: 'custom-div-icon', html: "<div style='background-color:#3498db; width:30px; height:30px; border-radius:50%; border:2px solid white; text-align:center; line-height:26px; font-size:16px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);'>🍚</div>", iconSize: [30, 30], iconAnchor: [15, 15] });
        var chineseIcon = L.divIcon({ className: 'custom-div-icon', html: "<div style='background-color:#e74c3c; width:30px; height:30px; border-radius:50%; border:2px solid white; text-align:center; line-height:26px; font-size:16px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);'>🥟</div>", iconSize: [30, 30], iconAnchor: [15, 15] });

        // 4. 지도에 핀 꽂기 및 프리미엄 팝업 연결
        restaurants.forEach(function(place) {
            // 주소에서 첫 단어(예: 중구)만 뽑아서 배지로 만들기
            var region = place.address.split(' ')[0]; 
            
            // 식당 이름으로 네이버 지도 검색 URL 자동 생성
            var naverSearchUrl = "https://map.naver.com/p/search/" + encodeURIComponent(place.name);

            // 팝업창 HTML 구조 조립 (사진과 동일한 레이아웃)
            var popupContent = `
                <div class="popup-header">
                    <div class="popup-title">🥩 ${place.name}</div>
                    <div class="header-badges">
                        <span class="badge-dark">${region}</span>
                        <span class="badge-orange">${place.menu}</span>
                    </div>
                </div>
                <div class="popup-body">
                    <div class="info-row">
                        <span>📍</span><span>${place.address}</span>
                    </div>
                    
                    <div class="feature-tags">
                        ${place.hasRoom ? `<span class="tag-green">🚪 룸가능</span>` : ''}
                        ${place.reservable ? `<span class="tag-green">✅ 예약가능</span>` : ''}
                    </div>
                    
                    <a href="${naverSearchUrl}" target="_blank" class="naver-btn">
                        🟢 네이버
                    </a>
                </div>
            `;

            var selectedIcon = (place.menu === "한식") ? koreanIcon : (place.menu === "중식") ? chineseIcon : new L.Icon.Default();

            L.marker([place.lat, place.lng], {icon: selectedIcon})
                .bindPopup(popupContent, {className: 'custom-popup'})
                .addTo(map);
        });
    </script>
</body>
</html>
