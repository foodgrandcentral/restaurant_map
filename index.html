<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>나만의 예쁜 맛집 지도</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; background-color: #f8f9fa; }
        #map { width: 100vw; height: 100vh; }
        
        /* 팝업창 디자인 꾸미기 */
        .custom-popup .leaflet-popup-content-wrapper {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            padding: 5px;
        }
        .custom-popup .popup-title {
            font-size: 16px; font-weight: bold; color: #2c3e50; margin-bottom: 8px; border-bottom: 2px solid #3498db; padding-bottom: 5px;
        }
        .custom-popup .popup-info {
            font-size: 13px; color: #555; margin: 4px 0;
        }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // 1. 지도 시작 위치 맞추기 (서울 중심)
        var map = L.map('map').setView([37.5532, 126.9696], 13);

        // 2. 배경 지도 불러오기 (CartoDB Positron - 노선도처럼 깔끔한 스타일)
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap contributors © CARTO'
        }).addTo(map);

        // 3. ⭐️여기가 식당 데이터를 넣는 곳입니다! 엑셀 내용을 보며 계속 추가하세요⭐️
        var restaurants = [
            {
                name: "사유의서재 남산 와인다이닝",
                address: "중구 퇴계로 20길 13 3층",
                menu: "퓨전양식/와인",
                lat: 37.55968, // 위도 (숫자만)
                lng: 126.98588 // 경도 (숫자만)
            },
            {
                name: "모담 서울역점",
                address: "중구 세종대로 14 그랜드센트럴 지하 3층",
                menu: "한식",
                lat: 37.55820,
                lng: 126.97390
            },
            {
                name: "서령 본점",
                address: "중구 소월로 10 1층",
                menu: "한식",
                lat: 37.55640,
                lng: 126.97480
            },
            {
                name: "호우섬 서울역사점",
                address: "중구 한강대로 405 서울역사 3층",
                menu: "중식",
                lat: 37.55460,
                lng: 126.97060
            }
        ];

        // 4. 메뉴별 예쁜 커스텀 아이콘 만들기 (이모지 활용)
        // 한식 아이콘 (파란색 원 + 밥 이모지)
        var koreanIcon = L.divIcon({
            className: 'custom-div-icon',
            html: "<div style='background-color:#3498db; width:30px; height:30px; border-radius:50%; border:2px solid white; text-align:center; line-height:26px; font-size:16px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);'>🍚</div>",
            iconSize: [30, 30],
            iconAnchor: [15, 15] // 아이콘의 중심점
        });

        // 중식 아이콘 (빨간색 원 + 만두 이모지)
        var chineseIcon = L.divIcon({
            className: 'custom-div-icon',
            html: "<div style='background-color:#e74c3c; width:30px; height:30px; border-radius:50%; border:2px solid white; text-align:center; line-height:26px; font-size:16px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);'>🥟</div>",
            iconSize: [30, 30],
            iconAnchor: [15, 15]
        });

        // 5. 지도에 핀 꽂기 (조건에 따라 아이콘 바꿔주기)
        restaurants.forEach(function(place) {
            var popupContent = `
                <div class="popup-title">🍽️ ${place.name}</div>
                <p class="popup-info">📍 ${place.address}</p>
                <p class="popup-info">🍴 메뉴: ${place.menu}</p>
            `;

            // place.menu 글씨가 '한식'인지 '중식'인지 확인해서 아이콘 선택
            var selectedIcon;
            if (place.menu === "한식") {
                selectedIcon = koreanIcon;
            } else if (place.menu === "중식") {
                selectedIcon = chineseIcon;
            } else {
                selectedIcon = new L.Icon.Default(); // 한식/중식이 아니면 기본 파란 핀
            }

            // 선택된 아이콘(icon: selectedIcon)을 마커에 적용해서 지도에 추가
            L.marker([place.lat, place.lng], {icon: selectedIcon})
                .bindPopup(popupContent, {className: 'custom-popup'})
                .addTo(map);
        });
    </script>
</body>
</html>
