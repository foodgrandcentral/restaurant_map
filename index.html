                            <div class="info-row"><span>📍</span><span>${place.address}</span></div>
                            ${place.phone ? `<div class="info-row"><span>📞</span><span>${place.phone.replace(/\n/g, '<br>')}</span></div>` : ''}
                            ${place.detailMenu ? `<div class="info-row"><span>🍽️</span><span>${place.detailMenu.replace(/\n/g, '<br>')}</span></div>` : ''}
                            ${walkDisplay}
                            
                            <div class="feature-tags">
                                ${place.hasRoom ? `<span class="tag-green">🚪 룸가능</span>` : ''}
                                ${place.reservable ? `<span class="tag-green">✅ 예약가능</span>` : ''}
                            </div>
                            
                            ${place.memo ? `
                            <div class="box-container">
                                <div class="box-label"><span>📝</span> 메모</div>
                                <div class="content-box">${place.memo}</div>
                            </div>` : ''}
                            
                            ${place.comment ? `
                            <div class="box-container">
                                <div class="box-label"><span>💬</span> 코멘트</div>
                                <div class="content-box comment-box">${place.comment}</div>
                            </div>` : ''}

                            <a href="${naverSearchUrl}" target="_blank" class="naver-btn">🟢 네이버</a>
                        </div>
                    `;

                    var selectedIcon = icons[place.menu] || icons["기타"];
                    if(place.menu.includes("고기")) selectedIcon = icons["고기"];

                    var marker = L.marker([place.lat, place.lng], {icon: selectedIcon}).bindPopup(popupContent, {className: 'custom-popup'});
                    markerGroup.addLayer(marker);
                    
                    activeMarkers.push({ marker: marker, lat: place.lat, lng: place.lng });
                    var markerIndex = activeMarkers.length - 1;

                    listHtml += `
                        <li class="list-item" onclick="clickListItem(${markerIndex})">
                            <div class="list-title">${place.name}</div>
                            <div class="list-info">
                                <span class="list-badge">${region}</span>
                                <span class="list-badge" style="background:#fff3e0; color:#e67e22;">${place.menu}</span>
                            </div>
                        </li>
                    `;
                }
            });

            document.getElementById('restaurant-list').innerHTML = listHtml;
            document.getElementById('list-count').innerText = count + "개";
        }

        function clickListItem(index) {
            var item = activeMarkers[index];
            map.setView([item.lat, item.lng], 16); 
            item.marker.openPopup(); 
            if(window.innerWidth <= 600) { toggleSidebar(); }
        }

        var filterBtns = document.querySelectorAll('.filter-btn');
        filterBtns.forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                var clickedCat = e.target.getAttribute('data-category');
                if (clickedCat === "전체") {
                    activeCategories.clear();
                    activeCategories.add("전체");
                } else {
                    activeCategories.delete("전체");
                    if (activeCategories.has(clickedCat)) { activeCategories.delete(clickedCat); } 
                    else { activeCategories.add(clickedCat); }
                    if (activeCategories.size === 0) { activeCategories.add("전체"); }
                }
                filterBtns.forEach(b => {
                    var cat = b.getAttribute('data-category');
                    if (activeCategories.has(cat)) { b.classList.add('active'); } else { b.classList.remove('active'); }
                });
                renderMapAndList();
            });
        });

        document.getElementById('searchInput').addEventListener('input', function(e) { currentSearch = e.target.value; renderMapAndList(); });

        var sidebar = document.getElementById('sidebar');
        var sidebarToggle = document.getElementById('sidebar-toggle');
        function toggleSidebar() {
            sidebar.classList.toggle('closed');
            sidebarToggle.innerText = sidebar.classList.contains('closed') ? '▶' : '◀';
        }
        sidebarToggle.addEventListener('click', toggleSidebar);

        renderMapAndList();
    </script>
</body>
</html>
